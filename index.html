<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    
<H1>Ken's Website!</H1>


<!-- Start form embed -->
<script src="https://sky.blackbaudcdn.net/static/reg-form-loader/5/main.js"></script>
<!--
  If you embed multiple forms on your page, only copy one of the <script> lines.
  Otherwise, multiple copies of the form will appear.
-->
<div
  id="main"
  data-blackbaud-registration-form
  data-blackbaud-registration-form-envid="t-i1-iatLcg0iZRcXyffk_eA"
  data-blackbaud-registration-form-id="1cef4771-b0a9-49eb-86ad-a65e8d363eda"
  data-blackbaud-registration-form-zone="usa"
  data-blackbaud-registration-form-header-height="0">
  <!--
    If your page has a header/overlay, then you can set this
    'data-blackbaud-registration-form-header-height' value
    to your header height so that the payment form will
    scroll to the proper location when opened.
  -->
</div>
<!-- End form embed -->

<script>
  // this sets the params to go to local version of reg-form-spa.
  // could manually paste it, but this is cooler.
  var main = document.getElementById("main");
  console.log(main);
  
  // add this if you want to use a query param.
  var cfgFromQuery = new URLSearchParams(window.location.search).get("_cfgbr");
  if (cfgFromQuery) {
    var val = encodeURIComponent(cfgFromQuery);
    var makeLocal = "&local=true&_cfgbr =" + val;
    console.log("added query param _cfgbr: " + val);
    main.dataset.blackbaudRegistrationFormZone += makeLocal;
  }

</script>
</body>
</html>
